<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理科基礎学習ポータル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --text-color: #ffffff;
            --primary-color: #4ecca3;
            --secondary-color: #e94560;
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-hover: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
            background: linear-gradient(to right, #4ecca3, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            display: inline-block;
            margin-bottom: 3rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            transition: all 0.3s;
        }
        .nav-link:hover {
            background: var(--primary-color);
            color: #1a1a2e;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 800px;
        }

        .quiz-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(10px);
        }

        .quiz-card:hover {
            background: var(--card-hover);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-color: var(--primary-color);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .quiz-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .quiz-desc {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .portal-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <h1>⭐️ 理科基礎学習ポータル ⭐️</h1>
    <a href="index.html" class="nav-link">👈 全てのアプリ（総合ポータル）を表示</a>

    <div class="portal-grid">
        <a href="./periodic-table-quiz/index.html" class="quiz-card">
            <div class="icon">⚛️</div>
            <div class="quiz-title">元素記号クイズ</div>
            <div class="quiz-desc">
                元素名と記号を覚えよう！<br>
                (全25問 / マッチング対応)
            </div>
        </a>

        <a href="./chemical-quiz/index.html" class="quiz-card">
            <div class="icon">🧪</div>
            <div class="quiz-title">化学式クイズ</div>
            <div class="quiz-desc">
                物質名と化学式を覚えよう！<br>
                (全40問 / マッチング対応)
            </div>
        </a>

        <a href="./reaction-puzzle/index.html" class="quiz-card" style="border-color: #ffdd00; box-shadow: 0 0 15px rgba(255,221,0,0.2);">
            <div class="icon">⚖️</div>
            <div class="quiz-title">化学反応式係数クリア</div>
            <div class="quiz-desc">
                天秤を使って化学反応式の係数を合わせよう！<br>
                (全12問 / ランク攻略対応)
            </div>
        </a>
    </div>
</body>

</html>
