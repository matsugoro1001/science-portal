<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学反応式マスター：分子ボール＆天秤パズル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7">
    <script src="data.js?v=7" defer></script>
    <script src="script.js?v=7" defer></script>
</head>

<body>
    <!-- Start Screen -->
    <div id="start-screen" class="active" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center;">
        <h1 class="title" style="margin-bottom: 40px; font-size: 3rem;">化学反応式<br>係数合わせパズル</h1>
        <div style="display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 300px;">
            <button class="btn" style="background-color: #4ecca3; font-size: 1.2rem;" onclick="startGame('practice')">練習モード (Practice)</button>
            <button class="btn" style="background-color: #e94560; font-size: 1.2rem;" onclick="startTestModeSetup()">テストモード (Test)</button>
        </div>
        <a href="../basic.html" class="btn secondary" style="margin-top: 40px;">Back to Menu</a>
    </div>

    <!-- Name Input Modal -->
    <div id="name-input-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; width: 90%;">
            <h3 style="color: #1a1a2e; margin-bottom: 10px;">名前入力</h3>
            <p style="color: #555; margin-bottom: 20px;">成績を記録するための名前を入力してください。</p>
            <input type="text" id="test-player-name" placeholder="Name" style="width: 100%; padding: 10px; font-size: 1.2rem; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px;">
            <div style="display: flex; gap: 10px;">
                <button class="btn secondary" onclick="closeNameInput()" style="flex: 1; padding: 10px;">キャンセル</button>
                <button class="btn primary" onclick="confirmTestStart()" style="flex: 1; padding: 10px;">テスト開始</button>
            </div>
        </div>
    </div>

    <div class="game-container hidden" id="quiz-screen">
        <!-- 1. Header -->
        <div class="header" style="justify-content: flex-start; gap: 20px;">
            <div class="stats">
                <div class="time-box">⏱ <span id="time-display">60.0</span>s</div>
                <div class="combo-box" id="combo-display" style="opacity: 0;">0 CHAIN!</div>
            </div>
            <div class="prompt">
                <p>天秤を釣り合わせろ！</p>
                <h2 id="question-text">Loading...</h2>
            </div>
        </div>

        <!-- Win Overlay (Big Equation) -->
        <div id="win-overlay" class="hidden">
            <div class="win-content">
                <div class="win-title">PERFECT!</div>
                <div class="win-equation" id="win-equation">
                    <!-- Injected by JS: 2H₂ + O₂ → 2H₂O -->
                </div>
            </div>
        </div>

        <!-- 2. Balance Section -->
        <div class="balance-section">
            <div class="atom-counter left-counter" id="left-counter">
                <!-- H: 0, O: 0 -->
            </div>

            <div class="balance-scale">
                <div class="balance-arm" id="balance-arm">
                    <!-- Left Pan (Reactants) -->
                    <div class="pan left-pan" id="left-pan">
                        <div class="pan-content">
                            <!-- Molecule Objects go here -->
                        </div>
                    </div>

                    <!-- Pivot -->
                    <div class="pivot">
                        <div class="digital-display" id="balance-display">START</div>
                    </div>

                    <!-- Right Pan (Products) -->
                    <div class="pan right-pan" id="right-pan">
                        <div class="pan-content">
                            <!-- Molecule Objects go here -->
                        </div>
                    </div>
                </div>
                <div class="balance-base"></div>
            </div>

            <div class="atom-counter right-counter" id="right-counter">
                <!-- H: 0, O: 0 -->
            </div>
        </div>

        <!-- 3. Equation Section -->
        <div class="equation-section" id="equation-area">
            <!-- Injected by JS: 2 H2 + 1 O2 -> 2 H2O -->
        </div>

        <!-- 4. Stock Section -->
        <div class="stock-section" id="stock-area">
            <p class="stock-label">分子ボールストック (ドラッグして天秤へ)</p>
            <div class="stock-container" id="stock-container">
                <!-- Injected by JS: Infinite draggable molecules -->
            </div>
        </div>

        <!-- 5. Game Actions -->
        <div class="game-actions" style="display: flex; justify-content: center; gap: 20px; align-items: center; margin-top: 20px;">
            <button class="btn" style="background-color: #6c757d;" onclick="skipQuestion()">パス (Skip)</button>
            <button id="submit-btn" class="btn" style="background-color: #4ecca3; display: none;" onclick="submitAnswer()">決定 (Submit)</button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden">
            <h1 class="title">TIME UP!</h1>
            <div class="result-content">
                <div id="rank-display" class="rank-result" style="display:none;"></div>
                <div id="pass-display" class="pass-result" style="display:none;"></div>
                <div class="final-time" style="margin-bottom: 20px;"></div>
                
                <div class="rank-guide">
                    <h3>評価基準</h3>
                    <ul>
                        <li><span class="rank-badge rank-s">S</span>全12問クリア ＋ 1度も間違えない（▼を押さない）</li>
                        <li><span class="rank-badge rank-a">A</span>全12問クリア</li>
                        <li><span class="rank-badge rank-b">B</span>8〜11問クリア</li>
                        <li><span class="rank-badge rank-c">C</span>0〜7問クリア</li>
                    </ul>
                </div>

                <div>
                    <button class="btn" onclick="location.reload()">Play Again</button>
                    <a href="../index.html" class="btn secondary">Back to Menu</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
